name: myTransactions Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - '.github/**'
              - '*.py'
              - 'Dockerfile'
              - '*.toml'
              - 'Pipfile*'
              - '*.sh'
              - '*.yaml'
  build-macos:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12.1
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.1'
      
      - name: Install pipenv
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade pipenv wheel
      
      - id: cache-pipenv
        uses: actions/cache@v5
        with:
          path: ~/.local/share/virtualenvs
          key: ${{ runner.os }}-pipenv-${{ hashFiles('**/Pipfile.lock') }}

      - name: Install dependencies
        if: steps.cache-pipenv.outputs.cache-hit != 'true'
        run: |
          python -m pipenv install --deploy --dev
      
      - name: Run quality checks
        run: |
          python -m pipenv run black . --check
          python -m pipenv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          python -m pipenv run flake8 . --count --max-complexity=10 --max-line-length=88 --statistics
          python -m pipenv run mypy .

      - name: Run unit tests with coverage
        run: |
          python -m pipenv run pytest --cov --cov-report=xml

  build-linux:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-24.04
    container:
      image: python:3.12.1-slim-bookworm
    env:
      PIP_CACHE_DIR: /tmp/pip-cache
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_ROOT_USER_ACTION: ignore
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends curl git
          rm -rf /var/lib/apt/lists/*

      - name: Install pipenv
        run: |
          mkdir -p "$PIP_CACHE_DIR"
          python -m pip install pipenv wheel

      - name: Install dependencies
        run: |
          python -m pipenv install --deploy --dev

      - name: Run quality checks
        run: |
          python -m pipenv run black . --check
          python -m pipenv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          python -m pipenv run flake8 . --count --max-complexity=10 --max-line-length=88 --statistics
          python -m pipenv run mypy .

      - name: Run unit tests with coverage
        run: |
          python -m pipenv run pytest --cov --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          disable_search: true
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
          plugins: noop
          skip_validation: true
  deploy:
    needs: [build-macos, build-linux]
    name: Deploy to fly.io
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --update-only --detach -y
