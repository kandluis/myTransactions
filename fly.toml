# fly.toml app configuration file generated for mint-scraper on 2023-08-27T09:25:45-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "mint-scraper"
primary_region = "sea"
kill_signal = "SIGINT"
kill_timeout = "5s"

[env]
  PRIMARY_REGION = "sea"
  SESSION_FILE_PATH = "/data/.session.pkl"
  
[processes]
  scraper = "/app/serve.sh"
  web = "gunicorn report_server:app --bind 0.0.0.0:8080 --workers 1 --threads 4 --timeout 300"


[mounts]
  source = "mint_session_data"
  destination = "/data"

[[services]]
  processes = ["web"]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
